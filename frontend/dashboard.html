<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SolvEdge</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">
        <span class="logo-icon">🥇</span>
        <span class="logo-text">SolvEdge</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">หน้าแรก</a>
        <a href="/courses" class="nav-link">คอร์สทั้งหมด</a>
        <a href="/dashboard" class="nav-link">Dashboard</a>
      </div>
      <div class="nav-actions">
        <button onclick="logout()" class="btn btn-ghost">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="container">
      <div class="dashboard-header">
        <h1>Dashboard</h1>
        <p>ยินดีต้อนรับ <span id="user-name"></span></p>
      </div>

      <!-- Stats -->
      <div id="stats-grid" class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-card-label">รายได้รวม</div>
          <div id="total-revenue" class="stat-card-value">฿0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">ออเดอร์ทั้งหมด</div>
          <div id="total-orders" class="stat-card-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">ผู้ใช้ทั้งหมด</div>
          <div id="total-users" class="stat-card-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">คอร์สทั้งหมด</div>
          <div id="total-courses" class="stat-card-value">0</div>
        </div>
      </div>

      <!-- Recent Orders -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">ออเดอร์ล่าสุด</h2>
        </div>
        <div id="recent-orders">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>ผู้ซื้อ</th>
                <th>คอร์ส</th>
                <th>จำนวนเงิน</th>
                <th>สถานะ</th>
                <th>วันที่</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <!-- Orders loaded by JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Courses Management -->
      <div class="card" style="margin-top: 30px;">
        <div class="card-header">
          <h2 class="card-title">จัดการคอร์ส</h2>
          <button onclick="showCreateCourseModal()" class="btn btn-primary">+ เพิ่มคอร์ส</button>
        </div>
        <div id="courses-management">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>ชื่อคอร์ส</th>
                <th>ราคา</th>
                <th>ราคาลด</th>
                <th>สถานะ</th>
                <th>การจัดการ</th>
              </tr>
            </thead>
            <tbody id="courses-table-body">
              <!-- Courses loaded by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Create Course Modal -->
  <div id="create-course-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>เพิ่มคอร์สใหม่</h2>
        <button onclick="closeCreateCourseModal()" class="btn btn-ghost">&times;</button>
      </div>
      <form id="create-course-form">
        <div class="form-group">
          <label class="form-label">ชื่อคอร์ส</label>
          <input type="text" id="course-title" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">รายละเอียด</label>
          <textarea id="course-description" class="form-input" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">ราคา (บาท)</label>
            <input type="number" id="course-price" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">ราคาลด (บาท)</label>
            <input type="number" id="course-sale-price" class="form-input">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">หมวดหมู่</label>
          <input type="text" id="course-category" class="form-input" placeholder="เช่น AI Basics">
        </div>
        <div class="form-group">
          <label class="form-label">ระดับ</label>
          <select id="course-level" class="form-input">
            <option value="beginner">เบื้องต้น</option>
            <option value="intermediate">ปานกลาง</option>
            <option value="advanced">ขั้นสูง</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ระยะเวลา</label>
          <input type="text" id="course-duration" class="form-input" placeholder="เช่น 20 ชั่วโมง">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">บันทึก</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Check if user is admin
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user || user.role !== 'admin') {
      window.location.href = '/login';
    }

    document.getElementById('user-name').textContent = user?.name || 'Admin';

    // Load dashboard data
    async function loadDashboard() {
      try {
        const data = await getAdminDashboard();
        
        // Update stats
        document.getElementById('total-revenue').textContent = '฿' + data.stats.totalRevenue.toLocaleString();
        document.getElementById('total-orders').textContent = data.stats.totalOrders;
        document.getElementById('total-users').textContent = data.stats.totalUsers;
        document.getElementById('total-courses').textContent = data.stats.totalCourses;

        // Update recent orders table
        const ordersBody = document.getElementById('orders-table-body');
        ordersBody.innerHTML = data.recentOrders.map(order => `
          <tr>
            <td>#${order.id}</td>
            <td>${order.user_email}</td>
            <td>${order.course_title}</td>
            <td>฿${order.amount.toLocaleString()}</td>
            <td><span class="badge badge-${order.status === 'paid' ? 'success' : 'warning'}">${order.status}</span></td>
            <td>${formatDate(order.created_at)}</td>
          </tr>
        `).join('');

        // Load courses for management
        await loadCourses();
      } catch (error) {
        console.error('Failed to load dashboard:', error);
        showToast('ไม่สามารถโหลดข้อมูลได้', 'error');
      }
    }

    async function loadCourses() {
      const data = await getAdminCourses();
      const coursesBody = document.getElementById('courses-table-body');
      coursesBody.innerHTML = data.courses.map(course => `
        <tr>
          <td>#${course.id}</td>
          <td>${course.title}</td>
          <td>฿${course.price.toLocaleString()}</td>
          <td>${course.sale_price ? '฿' + course.sale_price.toLocaleString() : '-'}</td>
          <td><span class="badge badge-${course.published ? 'success' : 'warning'}">${course.published ? 'เผยแพร่' : 'ซ่อน'}</span></td>
          <td>
            <button onclick="editCourse(${course.id})" class="btn btn-ghost">แก้ไข</button>
            <button onclick="deleteCourse(${course.id})" class="btn btn-danger">ลบ</button>
          </td>
        </tr>
      `).join('');
    }

    function showCreateCourseModal() {
      document.getElementById('create-course-modal').style.display = 'flex';
    }

    function closeCreateCourseModal() {
      document.getElementById('create-course-modal').style.display = 'none';
    }

    document.getElementById('create-course-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const courseData = {
        title: document.getElementById('course-title').value,
        description: document.getElementById('course-description').value,
        price: parseFloat(document.getElementById('course-price').value),
        sale_price: parseFloat(document.getElementById('course-sale-price').value) || null,
        category: document.getElementById('course-category').value,
        level: document.getElementById('course-level').value,
        duration: document.getElementById('course-duration').value,
        featured: false,
        published: true
      };

      try {
        await createCourse(courseData);
        showToast('เพิ่มคอร์สสำเร็จ!', 'success');
        closeCreateCourseModal();
        await loadCourses();
      } catch (error) {
        showToast('ไม่สามารถเพิ่มคอร์สได้', 'error');
      }
    });

    async function deleteCourseAction(id) {
      if (confirm('ต้องการลบคอร์สนี้?')) {
        try {
          await deleteCourse(id);
          showToast('ลบคอร์สสำเร็จ!', 'success');
          await loadCourses();
        } catch (error) {
          showToast('ไม่สามารถลบคอร์สได้', 'error');
        }
      }
    }

    // Initialize
    loadDashboard();
  </script>

  <style>
    .dashboard-main {
      padding: 100px 0 40px;
      min-height: 100vh;
      background: var(--gradient-hero);
    }

    .dashboard-header {
      margin-bottom: 40px;
    }

    .dashboard-header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .dashboard-header p {
      color: var(--text-secondary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--border);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
  </style>
</body>
</html>
