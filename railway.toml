[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@10.4.1 --activate && pnpm install && pnpm build"

[deploy]
startCommand = "sh -lc 'corepack enable && corepack prepare pnpm@10.4.1 --activate && pnpm db:push && node server/seed.mjs || true; pnpm start'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
